project:
    name: plastdrift-surface-web
    temperature_c: 25.0
    output_root: data/output

ui_defaults:
    release_lat: 35.0
    release_lon: 129.0
    release_time: "2024-01-01T00:00:00"

simulation:
    duration_hours: 168
    particles: 300
    release_radius_m: 5000
    z: 0.0
    time_step_minutes: 60
    output_time_step_minutes: 60
    stokes_drift: false
    vertical_mixing: false
    vertical_advection: false
    log_level: INFO
    export_variables: []

analysis:
    snapshots_hours:
        - 24
        - 72
        - 168
    target_radius_km: 50.0
    animation_frame_stride: 1

parameter_presets:
    PE:
        "33":
            diesel:
                terminal_velocity: 0.0000
                wind_drift_factor: 0.030
                current_drift_factor: 1.000
            kerosene:
                terminal_velocity: 0.0005
                wind_drift_factor: 0.032
                current_drift_factor: 0.995
        "40":
            diesel:
                terminal_velocity: -0.0005
                wind_drift_factor: 0.028
                current_drift_factor: 1.010
            kerosene:
                terminal_velocity: 0.0008
                wind_drift_factor: 0.031
                current_drift_factor: 1.000
